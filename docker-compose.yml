version: '3.9'

# ─── KodeChirp Production-Grade Stack ────────────────────────────────────────

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kodechirp-postgres
    environment:
      POSTGRES_DB: kodechirp
      POSTGRES_USER: kodechirp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kodechirp_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:Z
      - ./database/seeds:/docker-entrypoint-initdb.d/seeds:Z
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kodechirp -d kodechirp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kodechirp-net

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kodechirp-redis
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --loglevel warning
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kodechirp-net

  # ── Node.js API Gateway ──────────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: kodechirp-gateway
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: postgresql://kodechirp:${POSTGRES_PASSWORD:-kodechirp_dev}@postgres:5432/kodechirp
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      WORKER_API_URL: http://worker:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./gateway/src:/app/src:z
    restart: unless-stopped
    networks:
      - kodechirp-net

  # ── Python FastAPI Worker ────────────────────────────────────────────────
  worker:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: kodechirp-worker
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://kodechirp:${POSTGRES_PASSWORD:-kodechirp_dev}@postgres:5432/kodechirp
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      EXECUTION_TIMEOUT: ${EXECUTION_TIMEOUT:-10}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      DOCKER_HOST: unix:///var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:z
      - /tmp/kodechirp:/tmp/kodechirp:z
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    restart: unless-stopped
    networks:
      - kodechirp-net

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kodechirp-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - kodechirp-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  kodechirp-net:
    driver: bridge
